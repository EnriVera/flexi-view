schema: spec-driven

context: |
  Tech stack: Web Components + Lit ^3.0.0 + Shadow DOM + TypeScript ^5.0.0
  Architecture: npm library, framework-agnostic, <data-view> wrapper + sub-views
  Testing: Vitest ^1.0.0 (unit) + Playwright ^1.40.0 (e2e)
  Style: CSS Custom Properties (--dv-*) + ::part() for theming

strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Test-driven: write failing test first, then implement
    tdd: true
    test_command: "npm test"
  verify:
    - Run tests to verify implementation matches specs
    - Cover unit tests for logic, E2E for integration
    test_command: "npm test"
    build_command: "npm run build"
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: true
  test_runner: vitest
  test_command: npm test
  unit: true
  integration: false
  e2e: true
  coverage: true
  note: "Unit and E2E available. Integration layer not configured."