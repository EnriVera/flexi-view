schema: spec-driven

context: |
  Tech stack: Web Components + Lit ~5KB + Shadow DOM + TypeScript
  Architecture: npm library, framework-agnostic, <data-view> wrapper + sub-views
  Testing: TBD — planned Vitest + Playwright (project is empty, no package.json yet)
  Style: CSS Custom Properties (--dv-*) + ::part() for theming

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: false
  test_runner: NOT DETECTED
  unit: false
  integration: false
  e2e: false
  coverage: false
  note: "Project is empty. Re-run sdd-init after package.json is created."
